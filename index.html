<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for my mbg💐</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    width:350px;
    background:white;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#ff4f81;
}

p{
    margin:20px 0;
    color:#444;
    line-height:1.6;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:50px;
    font-size:16px;
    cursor:pointer;
    margin:10px;
    transition:.3s;
}

#yes{
    background:#ff4f81;
    color:white;
}

#yes:hover{
    transform:scale(1.08);
}

#no{
    background:#ddd;
}

#message{
    display:none;
    margin-top:20px;
    color:#ff4f81;
    font-weight:bold;
    font-size:20px;
}

.heart{
    position:absolute;
    color:white;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>haii, kamuuuu</h1>

    <p>
        maapinn akuuu yaaa
atas semua kesalahan akuu
mbg(my beautiful girl🥰)
    </p>


    <h2>maapin yak?</h2>

    <button id="yes">🤍 iyaa</button>
    <button id="no">😨 gamaw</button>

    <div id="message">
         hehe 👉🏻👈🏻
    </div>
</div>

<script>

document.getElementById("yes").onclick = function(){
    window.location.href = "https://wa.me/62882006738913?text=iyaaa%20aku%20maafinn%20";
};

document.getElementById("no").onclick = function(){
    alert("masaa gituu sii");
};

for(let i=0;i<40;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="🤍🤍";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*5)+"s";
    heart.style.fontSize=(15+Math.random()*20)+"px";
    document.body.appendChild(heart);
}

</script>
